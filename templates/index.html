<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flintel</title>
</head>
<body>

<script>
(() => {
    "use strict";

    const C = (...v) => String.fromCharCode(...v);

    const S = [
        [95,95],
        [105,110,116,101,114,110,97,108],
        [95,95],
        [112,97,103,101]
    ];

    const endpoint = (() => {
        const a = C(...S[0]);
        const b = C(...S[1]);
        const c = C(...S[2]);
        const d = C(...S[3]);

        return ["/", a, b, c, "/", d].join("");
    })();

    const options = Object.freeze({
        cache: ["no", "store"].join("-"),
        credentials: ["same", "origin"].join("-")
    });

    (async () => {
        try {
            const response = await fetch(endpoint, options);

            if (!response.ok) {
                throw new Error("404");
            }

            const html = await response.text();

            document.open();
            document.write(html);
            document.close();

        } catch (_) {
            document.body.innerHTML = "<h1>404 Not Found</h1>";
        }
    })();

})();
</script>

</body>
</html>
