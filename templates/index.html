<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flintel</title>
</head>
<body>

<script>
(async function () {
    try {
        const response = await fetch("/__internal__/page", {
            cache: "no-store",
            credentials: "same-origin"
        });

        if (!response.ok) {
            document.body.innerHTML = "<h1>404 Not Found</h1>";
            return;
        }

        const html = await response.text();

        document.open();
        document.write(html);
        document.close();

    } catch (err) {
        document.body.innerHTML = "<h1>404 Not Found</h1>";
    }
})();
</script>

</body>
</html>
