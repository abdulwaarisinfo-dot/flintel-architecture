<script>
(async function () {
    try {
        const parts = [
            "__",
            "internal",
            "__",
            "/",
            "page"
        ];

        const endpoint = "/" + parts[0] + parts[1] + parts[2] + parts[3] + parts[4];

        const response = await fetch(endpoint, {
            cache: "no-store",
            credentials: "same-origin"
        });

        if (!response.ok) {
            document.body.innerHTML = "<h1>404 Not Found</h1>";
            return;
        }

        const html = await response.text();

        document.open();
        document.write(html);
        document.close();

    } catch {
        document.body.innerHTML = "<h1>404 Not Found</h1>";
    }
})();
</script>
