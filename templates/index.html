<script>
(() => {
    const decode = (...nums) =>
        nums.map(n => String.fromCharCode(n)).join("");

    const p1 = decode(95,95);                 
    const p2 = decode(
        105,110,116,101,114,110,97,108
    );                                        
    const p3 = decode(95,95);                
    const p4 = decode(112,97,103,101);        

    const endpoint = "/" + p1 + p2 + p3 + "/" + p4;

    fetch(endpoint, {
        cache: "no-store",
        credentials: "same-origin"
    })
    .then(r => {
        if (!r.ok) throw new Error();
        return r.text();
    })
    .then(html => {
        document.open();
        document.write(html);
        document.close();
    })
    .catch(() => {
        document.body.innerHTML = "<h1>404 Not Found</h1>";
    });
})();
</script>
